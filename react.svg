import { useEffect, useState } from "react";
import { motion } from "framer-motion";
import { Clipboard, Eye, EyeOff } from "lucide-react";
import axios from "axios";

export default function SeedPhraseCard({ onConfirm, encryptionPin}) {
  const [Address, setAddress] = useState(null); 
  const [phrase, setPhrase] = useState([]);
  const [revealed, setRevealed] = useState(false);
  const [isConfirming, setIsConfirming] = useState(false);
  const [error, setError] = useState(null);
  
  const fetchMnemonic = async () => {
  try {
    const response = await axios.get(
      "https://blockgo-backend.onrender.com/generate-wallet",
      { withCredentials: true }
    );

    console.log(response);

    if (response.data && response.data.mnemonic) {
      const wordsArray = response.data.mnemonic.split(" ");
      setPhrase(wordsArray);   
    }
     if (response.data?.addresses) {
      localStorage.setItem(
        "wallet_data",
        JSON.stringify(response.data.addresses)
      );
    }

  } catch (err) {
    console.error("Failed to fetch from backend:", err);
    setError("Could not connect to the wallet server.");
  }
};


  useEffect(() => {
    fetchMnemonic();
  }, []);

  const deriveKey = async (password, salt) => {
    const encoder = new TextEncoder();
    const baseKey = await crypto.subtle.importKey(
      "raw",
      encoder.encode(password),
      "PBKDF2",
      false,
      ["deriveKey"]
    );

    return crypto.subtle.deriveKey(
      {
        name: "PBKDF2",
        salt: salt,
        iterations: 100000,
        hash: "SHA-256",
      },
      baseKey,
      { name: "AES-GCM", length: 256 },
      true,
      ["encrypt", "decrypt"]
    );
  };

  const saveEncryptedSeed = async (seedPhrase, password) => {
    const encoder = new TextEncoder();
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv = crypto.getRandomValues(new Uint8Array(12));

    const key = await deriveKey(password, salt);

    const encrypted = await crypto.subtle.encrypt(
      { name: "AES-GCM", iv: iv },
      key,
      encoder.encode(seedPhrase)
    );

    const payload = {
      content: btoa(String.fromCharCode(...new Uint8Array(encrypted))),
      salt: btoa(String.fromCharCode(...salt)),
      iv: btoa(String.fromCharCode(...iv)),
    };

    localStorage.setItem("encrypted_wallet", JSON.stringify(payload));
  };

  const handleConfirm = async () => {
    if (!phrase.length || !encryptionPin) {
      console.error("Missing phrase or PIN");
      return;
    }

    setIsConfirming(true);
    
    try {
      const fullPhraseString = phrase.join(" ");
  
      await saveEncryptedSeed(fullPhraseString, encryptionPin);

      setTimeout(() => {
        setIsConfirming(false);
        onConfirm(); 
      }, 2000);

    } catch (error) {
      console.error("Encryption failed:", error);
      setIsConfirming(false);
      alert("Failed to secure wallet. Please try again.");
    }
  };

  const copySeed = async () => {
    if (phrase.length > 0) {
      await navigator.clipboard.writeText(phrase.join(" "));
      alert("Seed phrase copied");
    }
  };

  return (
    <div className="text-white">
      <h2 className="text-xl font-semibold mb-2">Secret Recovery Phrase</h2>
      <p className="text-sm text-gray-400 mb-5">
        Write this down. Never share it with anyone.
      </p>

    
      <div className="w-full mb-9 grid grid-cols-3 gap-3 relative right-1">
        {phrase.map((word, i) => (
          <div key={i} className="relative">
            <p className="relative right-5 top-8 w-10 text-right text-sm text-neutral-500 pointer-events-none right-[21px]">
              {i + 1}.
            </p>
            <div className="w-[110%] h-11 rounded-xl bg-[#151515] border border-neutral-700 pl-[21px] mr-6 flex items-center overflow-hidden">
              <span className={`text-lg font-semibold font-sans transition-all duration-300 select-none 
                ${revealed ? "text-white blur-none" : "text-transparent [text-shadow:0_0_10px_rgba(255,255,255,0.5)]"}`}>
                {word}
              </span>
            </div>
          </div>
        ))}
      </div>

    
      <div className="flex gap-2 mb-5">
        <button
          onClick={() => setRevealed(!revealed)}
          className="flex-1 bg-[#1f1f1f] py-2 rounded-lg flex items-center justify-center gap-2 hover:bg-[#2a2a2a] transition"
        >
          {revealed ? <EyeOff size={16} /> : <Eye size={16} />}
          {revealed ? "Hide" : "Reveal"}
        </button>

        <button
          onClick={copySeed}
          className="flex-1 bg-[#1f1f1f] py-2 rounded-lg flex items-center justify-center gap-2 hover:bg-[#2a2a2a] transition"
        >
          <Clipboard size={16} />
          Copy
        </button>
      </div>

      
      <button
        disabled={!revealed || isConfirming || phrase.length === 0}
        onClick={handleConfirm}
        className={`w-full py-3 rounded-xl font-medium transition flex items-center justify-center
          ${revealed && !isConfirming && phrase.length > 0
            ? "bg-[#a996ff] text-black hover:bg-[#9683e6]"
            : "bg-[#2a2a2a] text-gray-500 cursor-not-allowed"}
        `}
      >
        {isConfirming ? (
          <>
            <div className="h-5 w-5 animate-spin rounded-full border-2 border-black border-t-transparent mr-2" />
            Processing...
          </>
        ) : (
          "I’ve saved my recovery phrase"
        )}
      </button>
    </div>
  );
}
